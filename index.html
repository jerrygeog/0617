<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>得正 Oolong Tea Project｜團購訂單</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background: #f5f0e8; color: #1a1a2e; min-height: 100vh;
  }
  header {
    background: #1a1a2e; color: #f5f0e8;
    padding: 28px 20px 20px; text-align: center;
  }
  header .brand-en { font-size: 11px; letter-spacing: 4px; color: #8db4c8; margin-bottom: 4px; }
  header h1 { font-size: 26px; font-weight: 700; letter-spacing: 2px; }
  header .subtitle { font-size: 12px; color: #8db4c8; margin-top: 6px; letter-spacing: 1px; }

  .tab-bar { display: flex; background: #1a1a2e; position: sticky; top: 0; z-index: 10; }
  .tab { flex: 1; padding: 12px; text-align: center; font-size: 12px; font-weight: 700; color: #8db4c8; cursor: pointer; letter-spacing: 1px; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab.active { color: #f5f0e8; border-bottom-color: #8db4c8; }

  .view { display: none; }
  .view.active { display: block; }

  .order-form { max-width: 480px; margin: 0 auto; padding: 16px; padding-bottom: 100px; }

  .name-section { background: white; border-radius: 14px; padding: 18px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .name-section label { font-size: 13px; color: #666; display: block; margin-bottom: 8px; font-weight: 600; letter-spacing: 0.5px; }
  .name-section input { width: 100%; border: 2px solid #e0d8cc; border-radius: 10px; padding: 12px 14px; font-size: 16px; outline: none; transition: border-color 0.2s; background: #faf8f5; }
  .name-section input:focus { border-color: #1a1a2e; }

  .category { margin-bottom: 12px; }
  .category-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #8db4c8; padding: 0 4px 8px; border-bottom: 1px solid #d6cfc4; margin-bottom: 8px; }

  .item { background: white; border-radius: 14px; padding: 16px; margin-bottom: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
  .item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .item-info .item-name { font-size: 15px; font-weight: 700; color: #1a1a2e; }
  .item-info .item-name-en { font-size: 11px; color: #999; margin-top: 2px; }
  .item-info .item-price { font-size: 12px; color: #5a7f94; margin-top: 3px; font-weight: 600; }

  .size-controls { display: flex; flex-direction: column; gap: 6px; }
  .size-row { display: flex; align-items: center; gap: 6px; }
  .size-label { font-size: 11px; color: #888; width: 14px; font-weight: 700; }
  .qty-control { display: flex; align-items: center; border: 1.5px solid #e0d8cc; border-radius: 8px; overflow: hidden; background: #faf8f5; }
  .qty-btn { width: 30px; height: 30px; border: none; background: none; font-size: 17px; cursor: pointer; color: #1a1a2e; display: flex; align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0; }
  .qty-btn:active { background: #eee; }
  .qty-display { width: 28px; text-align: center; font-size: 14px; font-weight: 700; color: #1a1a2e; }

  /* Options area - shown when qty > 0 */
  .item-options { display: none; border-top: 1px solid #f0ece4; padding-top: 12px; margin-top: 4px; }
  .item-options.visible { display: block; }

  .option-group { margin-bottom: 10px; }
  .option-label { font-size: 11px; font-weight: 700; color: #888; letter-spacing: 1px; margin-bottom: 6px; }
  .option-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1.5px solid #e0d8cc; background: #faf8f5; color: #555; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .chip.selected { background: #1a1a2e; color: #f5f0e8; border-color: #1a1a2e; }
  .chip.topping { border-color: #8db4c8; }
  .chip.topping.selected { background: #8db4c8; color: #1a1a2e; border-color: #8db4c8; }

  .size-option-block { background: #faf8f5; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
  .size-option-title { font-size: 11px; font-weight: 700; color: #5a7f94; margin-bottom: 8px; letter-spacing: 1px; }

  .recommend-dot { display: inline-block; width: 6px; height: 6px; background: #8db4c8; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

  .summary-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a2e; color: #f5f0e8; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 -4px 20px rgba(0,0,0,0.18); z-index: 100; }
  .summary-bar .my-total { font-size: 13px; color: #8db4c8; }
  .summary-bar .my-amount { font-size: 20px; font-weight: 700; }
  .submit-btn { background: #8db4c8; color: #1a1a2e; border: none; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .submit-btn:active { background: #7aa3b5; }

  /* Summary */
  .summary-wrap { max-width: 480px; margin: 0 auto; padding: 16px; padding-bottom: 40px; }
  .grand-bar { display: flex; justify-content: space-between; font-size: 18px; font-weight: 700; padding: 14px 20px; background: #1a1a2e; color: #f5f0e8; border-radius: 12px; margin-bottom: 12px; }
  .stat-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .stat-box { flex: 1; background: white; border-radius: 10px; padding: 14px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .stat-box .stat-label { font-size: 11px; color: #999; margin-bottom: 4px; }
  .stat-box .stat-val { font-size: 22px; font-weight: 700; }
  .card { background: white; border-radius: 14px; padding: 20px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .card-title { font-size: 13px; color: #8db4c8; letter-spacing: 2px; margin-bottom: 14px; }
  .person-block { border-bottom: 1px solid #f0ece4; padding-bottom: 12px; margin-bottom: 12px; }
  .person-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .person-name { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
  .order-entry { font-size: 13px; background: #faf8f5; border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; }
  .order-entry .entry-main { display: flex; justify-content: space-between; font-weight: 600; }
  .order-entry .entry-opts { font-size: 11px; color: #888; margin-top: 3px; }
  .person-subtotal { font-size: 14px; font-weight: 700; text-align: right; color: #1a1a2e; margin-top: 6px; }
  .item-stat-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 6px 0; border-bottom: 1px solid #f0ece4; }
  .item-stat-row:last-child { border-bottom: none; }
  .action-btns { display: flex; gap: 10px; margin-bottom: 12px; }
  .btn-outline { flex: 1; padding: 12px; border: 2px solid #1a1a2e; background: white; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .btn-danger { flex: 1; padding: 12px; background: #c0392b; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }

  .copied-toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #1a1a2e; color: white; padding: 12px 24px; border-radius: 12px; font-size: 15px; font-weight: 700; display: none; z-index: 999; }

  .empty-state { text-align: center; padding: 60px 20px; color: #999; }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <div class="brand-en">OOLONG TEA PROJECT</div>
  <h1>得　正</h1>
  <div class="subtitle">新北市中和 ▸ 團購訂單</div>
</header>

<div class="tab-bar">
  <div class="tab active" id="tab-order" onclick="showView('order')">📋 填寫訂單</div>
  <div class="tab" id="tab-summary" onclick="showView('summary')">📊 團購總表</div>
</div>

<div id="view-order" class="view active">
  <div class="order-form">
    <div class="name-section">
      <label>👤 您的姓名</label>
      <input type="text" id="buyer-name" placeholder="請輸入您的名字" />
    </div>

    <!-- 原味茶 -->
    <div class="category">
      <div class="category-title">ORIGINAL TEA　原味茶</div>
      <div class="item" data-name="紅茶" data-en="Black Tea" data-m="25" data-l="30"></div>
      <div class="item" data-name="綠茶" data-en="Green Tea" data-m="25" data-l="30"></div>
      <div class="item" data-name="春烏龍" data-en="Spring Oolong Tea" data-m="30" data-l="35" data-rec="1"></div>
      <div class="item" data-name="輕烏龍" data-en="Light Roasted Oolong Tea" data-m="30" data-l="35" data-rec="1"></div>
      <div class="item" data-name="焙烏龍" data-en="Dark Roasted Oolong Tea" data-m="30" data-l="35" data-rec="1"></div>
    </div>

    <!-- 水果茶 -->
    <div class="category">
      <div class="category-title">DOUBLE FRUIT　水果茶</div>
      <div class="item" data-name="檸檬春烏龍" data-en="Lemon Spring Oolong Tea" data-m="55" data-l="65" data-rec="1"></div>
      <div class="item" data-name="香橙春烏龍" data-en="Orange Spring Oolong Tea" data-m="60" data-l="70" data-rec="1"></div>
      <div class="item" data-name="甘蔗春烏龍" data-en="Sugar Cane Spring Oolong Tea" data-m="60" data-l="70" data-rec="1"></div>
      <div class="item" data-name="青梅春烏龍" data-en="Green Plum Spring Oolong Tea" data-m="50" data-l="60"></div>
      <div class="item" data-name="優酪春烏龍" data-en="Yogurt Spring Oolong Tea" data-m="55" data-l="65"></div>
      <div class="item" data-name="雙柚金烏龍" data-en="Yuzu Oolong Tea" data-m="55" data-l="65"></div>
    </div>

    <!-- 經典奶茶 -->
    <div class="category">
      <div class="category-title">CLASSIC MILK TEA　經典奶茶</div>
      <div class="item" data-name="奶茶" data-en="Milk Tea" data-m="45" data-l="50"></div>
      <div class="item" data-name="焙烏龍奶茶" data-en="Dark Roasted Oolong Milk Tea" data-m="45" data-l="50" data-rec="1"></div>
      <div class="item" data-name="珍珠奶茶" data-en="Pearl Milk Tea" data-m="55" data-l="60"></div>
      <div class="item" data-name="黃金珍珠奶綠" data-en="Golden Bubble Green Milk Tea" data-m="55" data-l="60" data-rec="1"></div>
      <div class="item" data-name="烘吉奶茶" data-en="Hojicha Milk Tea" data-single="50"></div>
    </div>

    <!-- 鮮奶系列 -->
    <div class="category">
      <div class="category-title">FRESH MILK　鮮奶系列</div>
      <div class="item" data-name="紅茶鮮奶" data-en="Black Tea Latte" data-m="55" data-l="65" data-rec="1"></div>
      <div class="item" data-name="輕烏龍鮮奶" data-en="Light Roasted Oolong Tea Latte" data-m="55" data-l="65" data-rec="1"></div>
      <div class="item" data-name="焙烏龍鮮奶" data-en="Dark Roasted Oolong Tea Latte" data-m="55" data-l="65"></div>
      <div class="item" data-name="烘吉鮮奶" data-en="Hojicha Latte" data-single="70"></div>
    </div>

    <!-- 芝士奶蓋 -->
    <div class="category">
      <div class="category-title">CHEESE MILK FOAM　芝士奶蓋</div>
      <div style="font-size:11px;color:#e07b4a;padding:0 4px 10px;">＊奶蓋固定少冰</div>
      <div class="item" data-name="芝士奶蓋春烏龍" data-en="Cheese Milk Foam Spring Oolong" data-m="50" data-l="60" data-rec="1" data-no-ice="1"></div>
      <div class="item" data-name="芝士奶蓋焙烏龍" data-en="Cheese Milk Foam Dark Roasted Oolong" data-m="50" data-l="60" data-rec="1" data-no-ice="1"></div>
      <div class="item" data-name="芝士奶蓋阿華田" data-en="Cheese Milk Foam Ovaltine" data-m="55" data-l="65" data-no-ice="1"></div>
      <div class="item" data-name="芝士奶蓋烘吉茶" data-en="Cheese Milk Foam Hojicha" data-m="55" data-l="65" data-no-ice="1"></div>

    <div style="height:20px;"></div>
  </div>

  <div class="summary-bar">
    <div>
      <div class="my-total">我的小計</div>
      <div class="my-amount">$<span id="live-total">0</span></div>
    </div>
    <button class="submit-btn" onclick="submitOrder()">確認送出 ▸</button>
  </div>
</div>

<!-- Summary View -->
<div id="view-summary" class="view">
  <div class="summary-wrap" id="summary-content">
    <div class="empty-state"><div class="icon">📋</div><div>目前還沒有人下單</div><div style="font-size:12px;margin-top:6px;">請到「填寫訂單」頁面選購</div></div>
  </div>
</div>

<div class="copied-toast" id="copied-toast">✅ 已複製到剪貼簿！</div>

<script>
const STORAGE_KEY = 'dezheng_v2';
const SWEETNESS = ['正常糖', '少糖', '半糖', '微糖', '無糖'];
const ICE = ['正常冰', '少冰', '微冰', '去冰'];
const TOPPINGS = [
  { label: '珍珠', extra: 10 },
  { label: '黃金珍珠', extra: 10 },
  { label: '焙烏龍茶凍', extra: 10 },
];

function loadOrders() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; }
}
function saveOrders(o) { localStorage.setItem(STORAGE_KEY, JSON.stringify(o)); }

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'summary') renderSummary();
}

// Build all item cards
function buildItems() {
  document.querySelectorAll('.item[data-name]').forEach(el => {
    const name = el.dataset.name;
    const en = el.dataset.en || '';
    const priceM = parseInt(el.dataset.m || 0);
    const priceL = parseInt(el.dataset.l || 0);
    const priceSingle = parseInt(el.dataset.single || 0);
    const isRec = el.dataset.rec === '1';
    const noIce = el.dataset.noIce === '1';

    const priceLabel = priceSingle ? `$${priceSingle}` : `M $${priceM} ／ L $${priceL}`;
    const recDot = isRec ? '<span class="recommend-dot"></span>' : '';

    let sizeControls = '';
    if (priceSingle) {
      sizeControls = `<div class="size-controls"><div class="size-row"><div class="qty-control">
        <button class="qty-btn" onclick="changeQty(this,-1,'single')">−</button>
        <span class="qty-display" data-size="single">0</span>
        <button class="qty-btn" onclick="changeQty(this,1,'single')">+</button>
      </div></div></div>`;
    } else {
      sizeControls = `<div class="size-controls">
        <div class="size-row"><span class="size-label">M</span><div class="qty-control">
          <button class="qty-btn" onclick="changeQty(this,-1,'M')">−</button>
          <span class="qty-display" data-size="M">0</span>
          <button class="qty-btn" onclick="changeQty(this,1,'M')">+</button>
        </div></div>
        <div class="size-row"><span class="size-label">L</span><div class="qty-control">
          <button class="qty-btn" onclick="changeQty(this,-1,'L')">−</button>
          <span class="qty-display" data-size="L">0</span>
          <button class="qty-btn" onclick="changeQty(this,1,'L')">+</button>
        </div></div>
      </div>`;
    }

    // Options per size
    function sizeOptionBlock(size, label) {
      const iceBlock = noIce ? `<div style="font-size:11px;color:#e07b4a;margin-top:4px;">（奶蓋固定少冰）</div>` : `
        <div class="option-group">
          <div class="option-label">🧊 冰塊</div>
          <div class="option-chips">
            ${ICE.map((s,i) => `<span class="chip ${i===0?'selected':''}" data-type="ice" data-size="${size}" onclick="selectChip(this,'ice','${size}')">${s}</span>`).join('')}
          </div>
        </div>`;
      return `<div class="size-option-block">
        <div class="size-option-title">${label} 杯設定</div>
        <div class="option-group">
          <div class="option-label">🍬 甜度</div>
          <div class="option-chips">
            ${SWEETNESS.map((s,i) => `<span class="chip ${i===0?'selected':''}" data-type="sweet" data-size="${size}" onclick="selectChip(this,'sweet','${size}')">${s}</span>`).join('')}
          </div>
        </div>
        ${iceBlock}
        <div class="option-group" style="margin-bottom:0">
          <div class="option-label">➕ 加料 <span style="color:#8db4c8;font-size:10px;">各+$10</span></div>
          <div class="option-chips">
            ${TOPPINGS.map(t => `<span class="chip topping" data-type="topping" data-size="${size}" data-extra="${t.extra}" onclick="toggleTopping(this,'${size}')">${t.label}</span>`).join('')}
          </div>
        </div>
      </div>`;
    }

    let optionBlocks = '';
    if (priceSingle) {
      optionBlocks = sizeOptionBlock('single', '');
    } else {
      optionBlocks = `<div id="${el.id||''}" class="ml-opts">
        <div class="size-opt-M" style="display:none">${sizeOptionBlock('M','M')}</div>
        <div class="size-opt-L" style="display:none">${sizeOptionBlock('L','L')}</div>
      </div>`;
    }

    el.innerHTML = `
      <div class="item-header">
        <div class="item-info">
          <div class="item-name">${recDot}${name}</div>
          <div class="item-name-en">${en}</div>
          <div class="item-price">${priceLabel}</div>
        </div>
        ${sizeControls}
      </div>
      <div class="item-options">${optionBlocks}</div>
    `;
  });
}

function changeQty(btn, delta, size) {
  const item = btn.closest('.item');
  const display = item.querySelector(`.qty-display[data-size="${size}"]`);
  let val = parseInt(display.textContent) + delta;
  if (val < 0) val = 0;
  display.textContent = val;

  // Show/hide options
  const optArea = item.querySelector('.item-options');
  const isSingle = item.dataset.single;

  if (isSingle) {
    optArea.classList.toggle('visible', val > 0);
  } else {
    const qtyM = parseInt(item.querySelector('.qty-display[data-size="M"]').textContent);
    const qtyL = parseInt(item.querySelector('.qty-display[data-size="L"]').textContent);
    optArea.classList.toggle('visible', qtyM > 0 || qtyL > 0);
    const mBlock = item.querySelector('.size-opt-M');
    const lBlock = item.querySelector('.size-opt-L');
    if (mBlock) mBlock.style.display = qtyM > 0 ? 'block' : 'none';
    if (lBlock) lBlock.style.display = qtyL > 0 ? 'block' : 'none';
  }

  updateLiveTotal();
}

function selectChip(chip, type, size) {
  const siblings = chip.closest('.option-chips').querySelectorAll('.chip');
  siblings.forEach(c => c.classList.remove('selected'));
  chip.classList.add('selected');
}

function toggleTopping(chip, size) {
  chip.classList.toggle('selected');
  updateLiveTotal();
}

function getItemData(item) {
  const name = item.dataset.name;
  const priceM = parseInt(item.dataset.m || 0);
  const priceL = parseInt(item.dataset.l || 0);
  const priceSingle = parseInt(item.dataset.single || 0);
  const entries = [];

  function getOpts(size) {
    const sweet = item.querySelector(`.chip[data-type="sweet"][data-size="${size}"].selected`);
    const ice = item.querySelector(`.chip[data-type="ice"][data-size="${size}"].selected`);
    const toppings = [...item.querySelectorAll(`.chip[data-type="topping"][data-size="${size}"].selected`)];
    return {
      sweet: sweet ? sweet.textContent : '正常糖',
      ice: ice ? ice.textContent : '正常冰',
      toppings: toppings.map(t => t.textContent),
      toppingExtra: toppings.reduce((s, t) => s + parseInt(t.dataset.extra || 0), 0)
    };
  }

  if (priceSingle) {
    const qty = parseInt(item.querySelector('.qty-display[data-size="single"]').textContent);
    if (qty > 0) {
      const opts = getOpts('single');
      entries.push({ name, size: '', qty, unitPrice: priceSingle + opts.toppingExtra, basePrice: priceSingle, opts, subtotal: qty * (priceSingle + opts.toppingExtra) });
    }
  } else {
    const qtyM = parseInt(item.querySelector('.qty-display[data-size="M"]').textContent);
    const qtyL = parseInt(item.querySelector('.qty-display[data-size="L"]').textContent);
    if (qtyM > 0) {
      const opts = getOpts('M');
      entries.push({ name, size: 'M', qty: qtyM, unitPrice: priceM + opts.toppingExtra, basePrice: priceM, opts, subtotal: qtyM * (priceM + opts.toppingExtra) });
    }
    if (qtyL > 0) {
      const opts = getOpts('L');
      entries.push({ name, size: 'L', qty: qtyL, unitPrice: priceL + opts.toppingExtra, basePrice: priceL, opts, subtotal: qtyL * (priceL + opts.toppingExtra) });
    }
  }
  return entries;
}

function updateLiveTotal() {
  let total = 0;
  document.querySelectorAll('.item[data-name]').forEach(item => {
    getItemData(item).forEach(e => total += e.subtotal);
  });
  document.getElementById('live-total').textContent = total;
}

function submitOrder() {
  const name = document.getElementById('buyer-name').value.trim();
  if (!name) { alert('請先輸入您的名字！'); document.getElementById('buyer-name').focus(); return; }

  const allEntries = [];
  document.querySelectorAll('.item[data-name]').forEach(item => {
    getItemData(item).forEach(e => allEntries.push(e));
  });

  if (!allEntries.length) { alert('請至少選一個飲品！'); return; }

  const total = allEntries.reduce((s, e) => s + e.subtotal, 0);
  const order = { name, entries: allEntries, total, time: new Date().toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'}) };

  const orders = loadOrders();
  const idx = orders.findIndex(o => o.name === name);
  if (idx >= 0) { if (!confirm(`已有 ${name} 的訂單，要覆蓋嗎？`)) return; orders.splice(idx,1); }
  orders.push(order);
  saveOrders(orders);

  // Reset
  document.querySelectorAll('.qty-display').forEach(d => d.textContent = '0');
  document.querySelectorAll('.item-options').forEach(o => o.classList.remove('visible'));
  document.querySelectorAll('.size-opt-M, .size-opt-L').forEach(b => b.style.display = 'none');
  document.querySelectorAll('.chip[data-type="sweet"], .chip[data-type="ice"]').forEach(c => {
    c.classList.toggle('selected', c.textContent === '正常糖' || c.textContent === '正常冰');
  });
  document.querySelectorAll('.chip[data-type="topping"]').forEach(c => c.classList.remove('selected'));
  document.getElementById('buyer-name').value = '';
  updateLiveTotal();
  alert(`✅ ${name} 的訂單已送出！\n共 ${allEntries.length} 項，小計 $${total}`);
}

function renderSummary() {
  const orders = loadOrders();
  const el = document.getElementById('summary-content');
  if (!orders.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📋</div><div>目前還沒有人下單</div><div style="font-size:12px;margin-top:6px;">請到「填寫訂單」頁面選購</div></div>`;
    return;
  }

  const grandTotal = orders.reduce((s,o) => s + o.total, 0);
  const grandQty = orders.reduce((s,o) => s + o.entries.reduce((ss,e) => ss + e.qty, 0), 0);

  // item map
  const itemMap = {};
  orders.forEach(o => o.entries.forEach(e => {
    const key = e.name + (e.size ? `(${e.size})` : '');
    if (!itemMap[key]) itemMap[key] = { qty: 0, total: 0 };
    itemMap[key].qty += e.qty;
    itemMap[key].total += e.subtotal;
  }));

  let html = `<div class="grand-bar"><span>🧾 總金額</span><span>$${grandTotal}</span></div>
  <div class="stat-row">
    <div class="stat-box"><div class="stat-label">總杯數</div><div class="stat-val">${grandQty}</div></div>
    <div class="stat-box"><div class="stat-label">訂購人數</div><div class="stat-val">${orders.length}</div></div>
  </div>
  <div class="card">
    <div class="card-title">個人明細</div>`;

  orders.forEach(o => {
    html += `<div class="person-block"><div class="person-name">👤 ${o.name} <span style="font-size:11px;color:#aaa;font-weight:400;">${o.time}</span></div>`;
    o.entries.forEach(e => {
      const sizeLabel = e.size ? `(${e.size})` : '';
      const toppingStr = e.opts.toppings.length ? `＋${e.opts.toppings.join('、')}` : '';
      html += `<div class="order-entry">
        <div class="entry-main"><span>${e.name}${sizeLabel} × ${e.qty}</span><span>$${e.subtotal}</span></div>
        <div class="entry-opts">${e.opts.sweet}／${e.opts.ice}${toppingStr ? '／' + toppingStr : ''}</div>
      </div>`;
    });
    html += `<div class="person-subtotal">小計 $${o.total}</div></div>`;
  });
  html += `</div>
  <div class="card">
    <div class="card-title">商品統計</div>`;
  Object.entries(itemMap).sort((a,b) => b[1].qty - a[1].qty).forEach(([key,val]) => {
    html += `<div class="item-stat-row"><span>${key}</span><span style="color:#555;">× ${val.qty}　<strong>$${val.total}</strong></span></div>`;
  });
  html += `</div>
  <div class="action-btns">
    <button class="btn-outline" onclick="copyText()">📋 複製訂單文字</button>
    <button class="btn-danger" onclick="clearOrders()">🗑️ 清空</button>
  </div>`;

  el.innerHTML = html;
}

function copyText() {
  const orders = loadOrders();
  if (!orders.length) return;
  const grandTotal = orders.reduce((s,o) => s + o.total, 0);
  const grandQty = orders.reduce((s,o) => s + o.entries.reduce((ss,e) => ss + e.qty, 0), 0);
  let text = `🧋 得正 Oolong Tea 團購訂單\n${'─'.repeat(26)}\n`;
  orders.forEach(o => {
    text += `\n👤 ${o.name}\n`;
    o.entries.forEach(e => {
      const toppingStr = e.opts.toppings.length ? `＋${e.opts.toppings.join('+')}` : '';
      text += `  ${e.name}${e.size?`(${e.size})`:''}${toppingStr} × ${e.qty}  [${ e.opts.sweet}／${e.opts.ice}]  $${e.subtotal}\n`;
    });
    text += `  小計：$${o.total}\n`;
  });
  text += `\n${'─'.repeat(26)}\n總杯數：${grandQty} 杯\n總金額：$${grandTotal}`;

  navigator.clipboard.writeText(text).then(() => {
    const t = document.getElementById('copied-toast');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
  }).catch(() => prompt('請手動複製：', text));
}

function clearOrders() {
  if (confirm('確定要清空所有訂單嗎？')) { localStorage.removeItem(STORAGE_KEY); renderSummary(); }
}

// Init
buildItems();
updateLiveTotal();
</script>
</body>
</html>
