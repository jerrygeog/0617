<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'PingFang TC','Microsoft JhengHei',Arial,sans-serif; background:#f7f3ee; color:#2c1a0e; min-height:100vh; }

header { background:#7b3f1e; color:#fff; padding:20px 16px 16px; text-align:center; }
header .brand-en { font-size:11px; letter-spacing:3px; color:#f0c98a; margin-bottom:4px; }
header h1 { font-size:22px; font-weight:800; letter-spacing:2px; }
header .subtitle { font-size:11px; color:#f0c98a; margin-top:5px; }

.tab-bar { display:flex; background:#5c2e0e; position:sticky; top:0; z-index:20; }
.tab { flex:1; padding:11px 4px; text-align:center; font-size:12px; font-weight:700; color:#f0c98a; cursor:pointer; border-bottom:2px solid transparent; }
.tab.active { color:#fff; border-bottom-color:#f0c98a; }

.view { display:none; }
.view.active { display:block; }

/* Order view */
.order-wrap { max-width:520px; margin:0 auto; padding:14px; padding-bottom:110px; }

.name-box { background:#fff; border-radius:12px; padding:16px; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,0.07); }
.name-box label { font-size:12px; font-weight:700; color:#666; display:block; margin-bottom:7px; }
.name-box input { width:100%; border:2px solid #e8ddd4; border-radius:8px; padding:10px 13px; font-size:16px; outline:none; background:#faf8f5; }
.name-box input:focus { border-color:#7b3f1e; }

/* Category accordion */
.cat-block { background:#fff; border-radius:12px; margin-bottom:10px; box-shadow:0 1px 6px rgba(0,0,0,0.07); overflow:hidden; }
.cat-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; cursor:pointer; background:#fff; border:none; width:100%; text-align:left; }
.cat-header-left { display:flex; align-items:center; gap:10px; }
.cat-icon { font-size:18px; }
.cat-name { font-size:15px; font-weight:800; color:#2c1a0e; }
.cat-count { font-size:11px; color:#999; margin-left:4px; }
.cat-arrow { font-size:14px; color:#999; transition:transform 0.25s; }
.cat-block.open .cat-arrow { transform:rotate(180deg); }
.cat-body { display:none; border-top:1px solid #f0e8e0; }
.cat-block.open .cat-body { display:block; }

/* Product row */
.prod-row { display:flex; align-items:center; padding:10px 16px; border-bottom:1px solid #f7f3ee; gap:10px; }
.prod-row:last-child { border-bottom:none; }
.prod-row.sold-out { opacity:0.45; }
.prod-info { flex:1; min-width:0; }
.prod-name { font-size:13px; font-weight:600; color:#2c1a0e; }
.prod-sub { font-size:11px; color:#999; margin-top:1px; }
.prod-price { font-size:13px; font-weight:700; color:#7b3f1e; white-space:nowrap; }
.sold-tag { font-size:10px; background:#e0d4cc; color:#888; border-radius:4px; padding:2px 6px; margin-left:6px; }

.qty-ctrl { display:flex; align-items:center; border:1.5px solid #e0d4cc; border-radius:8px; overflow:hidden; background:#faf8f5; flex-shrink:0; }
.qty-btn { width:30px; height:30px; border:none; background:none; font-size:16px; cursor:pointer; color:#2c1a0e; display:flex; align-items:center; justify-content:center; }
.qty-btn:active { background:#efe8e0; }
.qty-btn:disabled { color:#ccc; cursor:default; }
.qty-num { width:26px; text-align:center; font-size:14px; font-weight:700; }

/* Gift box section */
.gift-section { background:#fff8ee; border-radius:10px; margin:0 0 8px; padding:12px 16px; }
.gift-title { font-size:11px; font-weight:700; color:#7b3f1e; letter-spacing:1px; margin-bottom:8px; }
.gift-row { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid #f0e8e0; }
.gift-row:last-child { border-bottom:none; }
.gift-info { flex:1; }
.gift-name { font-size:13px; font-weight:700; }
.gift-sub { font-size:11px; color:#888; margin-top:2px; line-height:1.5; }
.gift-price { font-size:13px; font-weight:700; color:#7b3f1e; white-space:nowrap; }

/* Remark */
.remark-box { background:#fff; border-radius:12px; padding:14px 16px; margin-bottom:10px; box-shadow:0 1px 6px rgba(0,0,0,0.07); }
.remark-box label { font-size:12px; font-weight:700; color:#666; display:block; margin-bottom:7px; }
.remark-box textarea { width:100%; border:2px solid #e8ddd4; border-radius:8px; padding:10px 13px; font-size:14px; outline:none; background:#faf8f5; resize:vertical; min-height:70px; font-family:inherit; }
.remark-box textarea:focus { border-color:#7b3f1e; }

/* Bottom bar */
.bottom-bar { position:fixed; bottom:0; left:0; right:0; background:#5c2e0e; color:#fff; padding:13px 20px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 -4px 16px rgba(0,0,0,0.2); z-index:100; }
.bottom-bar .lbl { font-size:11px; color:#f0c98a; }
.bottom-bar .amt { font-size:19px; font-weight:800; }
.bottom-bar .qty-info { font-size:11px; color:#f0c98a; }
.submit-btn { background:#f0c98a; color:#5c2e0e; border:none; border-radius:10px; padding:10px 18px; font-size:14px; font-weight:800; cursor:pointer; }

/* Summary */
.summary-wrap { max-width:520px; margin:0 auto; padding:14px 14px 40px; }
.grand-bar { display:flex; justify-content:space-between; align-items:center; font-size:17px; font-weight:800; padding:14px 18px; background:#5c2e0e; color:#fff; border-radius:12px; margin-bottom:10px; }
.stat-row { display:flex; gap:10px; margin-bottom:10px; }
.stat-box { flex:1; background:#fff; border-radius:10px; padding:12px; text-align:center; box-shadow:0 1px 4px rgba(0,0,0,0.07); }
.stat-box .sl { font-size:11px; color:#999; margin-bottom:3px; }
.stat-box .sv { font-size:21px; font-weight:800; }
.card { background:#fff; border-radius:12px; padding:16px; margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,0.07); }
.card-title { font-size:11px; color:#7b3f1e; letter-spacing:2px; font-weight:700; margin-bottom:12px; }
.person-block { border-bottom:1px solid #f0e8e0; padding-bottom:12px; margin-bottom:12px; }
.person-block:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
.pname { font-size:15px; font-weight:800; margin-bottom:8px; }
.entry-row { display:flex; justify-content:space-between; align-items:center; font-size:13px; padding:5px 0; border-bottom:1px solid #faf5f0; }
.entry-row:last-of-type { border-bottom:none; }
.entry-name { color:#2c1a0e; }
.entry-amt { font-weight:700; color:#7b3f1e; white-space:nowrap; }
.remark-line { font-size:11px; color:#888; margin-top:6px; padding:6px 10px; background:#faf5f0; border-radius:6px; }
.psubtotal { font-size:14px; font-weight:800; text-align:right; margin-top:8px; color:#5c2e0e; }
.istat { display:flex; justify-content:space-between; align-items:center; font-size:13px; padding:6px 0; border-bottom:1px solid #f7f3ee; }
.istat:last-child { border-bottom:none; }
.action-btns { display:flex; gap:10px; }
.btn-o { flex:1; padding:12px; border:2px solid #5c2e0e; background:#fff; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; color:#5c2e0e; }
.btn-d { flex:1; padding:12px; background:#c0392b; color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; }
.toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#2c1a0e; color:#fff; padding:12px 24px; border-radius:12px; font-size:15px; font-weight:700; display:none; z-index:999; }
.empty { text-align:center; padding:60px 20px; color:#aaa; }
.empty .icon { font-size:40px; margin-bottom:10px; }

.selected-badge { display:inline-block; background:#7b3f1e; color:#fff; border-radius:10px; font-size:10px; font-weight:700; padding:1px 7px; margin-left:6px; vertical-align:middle; }
</style>
</head>

const GIFT_BOXES = [
  {name:'雙雙對對禮盒', sub:'特製+原檸', price:350},

  {name:'【素食】花開富貴禮盒', sub:'素鬆+辣絲+素蜜汁+椒麻', price:600},
  {name:'事事如意禮盒', sub:'兒童+小燒卷+豬條+原檸', price:750},
];

// ── State ──
const qtys = {}; // key: catId+':'+itemIdx => qty
let giftQtys = {}; // idx => qty

function loadOrders(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }catch(e){ return []; } }
function saveOrders(o){ localStorage.setItem(STORAGE_KEY, JSON.stringify(o)); }

// ── Build UI ──
function buildCategories(){
  const area = document.getElementById('categories-area');
  let html = '';

  CATEGORIES.forEach(cat => {
    const itemCount = cat.items.filter(i=>!i.soldOut).length;
    html += `<div class="cat-block" id="cat-${cat.id}">
      <button class="cat-header" onclick="toggleCat('${cat.id}')">
        <div class="cat-header-left">
          <span class="cat-icon">${cat.icon}</span>
          <span class="cat-name">${cat.name}</span>
          <span class="cat-count" id="count-${cat.id}">${cat.items.length} 項</span>
        </div>
        <span class="cat-arrow">▼</span>
      </button>
      <div class="cat-body">`;

    cat.items.forEach((item, idx) => {
      const key = `${cat.id}:${idx}`;
      const soldOut = item.soldOut;
      html += `<div class="prod-row${soldOut?' sold-out':''}">
        <div class="prod-info">
          <div class="prod-name">${item.name}${soldOut?'<span class="sold-tag">缺貨</span>':''}</div>
          ${item.sub?`<div class="prod-sub">${item.sub}</div>`:''}
        </div>
        <div class="prod-price">$${item.price}</div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty('${key}',-1,${item.price})" ${soldOut?'disabled':''}>−</button>
          <span class="qty-num" id="q-${key}">0</span>
          <button class="qty-btn" onclick="changeQty('${key}',1,${item.price})" ${soldOut?'disabled':''}>+</button>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  // Gift boxes
  html += `<div class="cat-block" id="cat-gift">
    <button class="cat-header" onclick="toggleCat('gift')">
      <div class="cat-header-left">
        <span class="cat-icon">🎁</span>
        <span class="cat-name">優質送禮禮盒</span>
        <span class="cat-count" id="count-gift">${GIFT_BOXES.length} 項</span>
      </div>
      <span class="cat-arrow">▼</span>
    </button>
    <div class="cat-body">
      <div style="padding:12px 16px 4px;">`;

  GIFT_BOXES.forEach((g, idx) => {
    const key = `gift:${idx}`;
    html += `<div class="gift-row">
      <div class="gift-info">
        <div class="gift-name">${g.name}</div>
        <div class="gift-sub">${g.sub}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="gift-price">$${g.price}</div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty('${key}',-1,${g.price})">−</button>
          <span class="qty-num" id="q-${key}">0</span>
          <button class="qty-btn" onclick="changeQty('${key}',1,${g.price})">+</button>
        </div>
      </div>
    </div>`;
  });

  html += `</div></div></div>`;
  area.innerHTML = html;
}

function toggleCat(id){
  const block = document.getElementById('cat-'+id);
  block.classList.toggle('open');
}

function changeQty(key, delta, price){
  const el = document.getElementById('q-'+key);
  let val = (qtys[key]||0)+delta;
  if(val<0) val=0;
  qtys[key] = val;
  el.textContent = val;
  updateLive();
  // Update category badge
  updateCatBadge(key);
}

function updateCatBadge(key){
  const catId = key.split(':')[0];
  let catItems, catData;
  if(catId==='gift'){
    catItems = GIFT_BOXES;
  } else {
    catData = CATEGORIES.find(c=>c.id===catId);
    catItems = catData ? catData.items : [];
  }
  const total = catItems.reduce((s,_,i)=>s+(qtys[`${catId}:${i}`]||0),0);
  const countEl = document.getElementById('count-'+catId);
  if(countEl){
    countEl.innerHTML = total>0
      ? `${catItems.length} 項 <span class="selected-badge">${total}</span>`
      : `${catItems.length} 項`;
  }
}

function updateLive(){
  let total=0, qty=0;
  Object.entries(qtys).forEach(([key,val])=>{
    if(val<=0) return;
    const [catId,idxStr] = key.split(':');
    const idx = parseInt(idxStr);
    let price=0;
    if(catId==='gift') price = GIFT_BOXES[idx]?.price||0;
    else {
      const cat = CATEGORIES.find(c=>c.id===catId);
      price = cat?.items[idx]?.price||0;
    }
    total += val*price;
    qty += val;
  });
  document.getElementById('live-total').textContent=total;
  document.getElementById('live-qty').textContent=qty;
}

function collectEntries(){
  const entries=[];
  Object.entries(qtys).forEach(([key,val])=>{
    if(val<=0) return;
    const [catId,idxStr] = key.split(':');
    const idx = parseInt(idxStr);
    let item, catName;
    if(catId==='gift'){
      item = GIFT_BOXES[idx];
      catName = '禮盒';
    } else {
      const cat = CATEGORIES.find(c=>c.id===catId);
      item = cat?.items[idx];
      catName = cat?.name||'';
    }
    if(!item) return;
    entries.push({ name:item.name, catName, price:item.price, qty:val, subtotal:val*item.price });
  });
  return entries;
}

function submitOrder(){
  const name = document.getElementById('buyer-name').value.trim();
  if(!name){ alert('請先輸入您的名字！'); document.getElementById('buyer-name').focus(); return; }
  const entries = collectEntries();
  if(!entries.length){ alert('請至少選一項商品！'); return; }
  const total = entries.reduce((s,e)=>s+e.subtotal,0);
  const qty = entries.reduce((s,e)=>s+e.qty,0);
  const remark = document.getElementById('remark').value.trim();
  const order = { name, entries, total, qty, remark, time: new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}) };

  const orders = loadOrders();
  const idx = orders.findIndex(o=>o.name===name);
  if(idx>=0){ if(!confirm(`已有 ${name} 的訂單，要覆蓋嗎？`)) return; orders.splice(idx,1); }
  orders.push(order);
  saveOrders(orders);

  // Reset
  Object.keys(qtys).forEach(k=>{ qtys[k]=0; const el=document.getElementById('q-'+k); if(el) el.textContent='0'; });
  document.querySelectorAll('[id^="count-"]').forEach(el=>{
    el.innerHTML = el.textContent.replace(/\s*<[^>]*>/g,'');
  });
  buildCategories(); // rebuild to reset badges
  document.getElementById('buyer-name').value='';
  document.getElementById('remark').value='';
  updateLive();
  showToast(`✅ ${name} 的訂單已送出！共 ${qty} 包，小計 $${total}`);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}

function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='summary') renderSummary();
}

function renderSummary(){
  const orders=loadOrders();
  const el=document.getElementById('summary-content');
  if(!orders.length){
    el.innerHTML='<div class="empty"><div class="icon">📋</div><div>目前還沒有人下單</div></div>';
    return;
  }
  const grandTotal=orders.reduce((s,o)=>s+o.total,0);
  const grandQty=orders.reduce((s,o)=>s+o.qty,0);

  // Item stat map grouped by name
  const itemMap={};
  orders.forEach(o=>o.entries.forEach(e=>{
    if(!itemMap[e.name]) itemMap[e.name]={qty:0,total:0,price:e.price};
    itemMap[e.name].qty+=e.qty;
    itemMap[e.name].total+=e.subtotal;
  }));

  let html=`<div class="grand-bar"><span>🧾 總金額</span><span>$${grandTotal}</span></div>
  <div class="stat-row">
    <div class="stat-box"><div class="sl">總包數</div><div class="sv">${grandQty}</div></div>
    <div class="stat-box"><div class="sl">訂購人數</div><div class="sv">${orders.length}</div></div>
  </div>
  <div class="card"><div class="card-title">個人明細</div>`;

  orders.forEach(o=>{
    html+=`<div class="person-block"><div class="pname">👤 ${o.name} <span style="font-size:11px;color:#aaa;font-weight:400;">${o.time}</span></div>`;
    o.entries.forEach(e=>{
      html+=`<div class="entry-row"><span class="entry-name">${e.name} × ${e.qty}</span><span class="entry-amt">$${e.subtotal}</span></div>`;
    });
    if(o.remark) html+=`<div class="remark-line">📝 ${o.remark}</div>`;
    html+=`<div class="psubtotal">小計 $${o.total}</div></div>`;
  });

  html+=`</div><div class="card"><div class="card-title">商品統計</div>`;
  Object.entries(itemMap).sort((a,b)=>b[1].qty-a[1].qty).forEach(([name,val])=>{
    html+=`<div class="istat"><span>${name}</span><span style="color:#7b3f1e;font-weight:700;">× ${val.qty}　$${val.total}</span></div>`;
  });

  html+=`</div><div class="action-btns">
    <button class="btn-o" onclick="copyText()">📋 複製訂單文字</button>
    <button class="btn-d" onclick="clearOrders()">🗑️ 清空</button>
  </div>`;
  el.innerHTML=html;
}

function copyText(){
  const orders=loadOrders();
  if(!orders.length) return;
  const grandTotal=orders.reduce((s,o)=>s+o.total,0);
  const grandQty=orders.reduce((s,o)=>s+o.qty,0);
  let text=`🛍️ 垂坤食品 冬季團購訂單\n${'─'.repeat(28)}\n`;
  orders.forEach(o=>{
    text+=`\n👤 ${o.name}\n`;
    o.entries.forEach(e=>{ text+=`  ${e.name} × ${e.qty}  $${e.subtotal}\n`; });
    if(o.remark) text+=`  備註：${o.remark}\n`;
    text+=`  小計：$${o.total}\n`;
  });
  text+=`\n${'─'.repeat(28)}\n總包數：${grandQty} 包\n總金額：$${grandTotal}`;
  navigator.clipboard.writeText(text).then(()=>showToast('✅ 已複製到剪貼簿！')).catch(()=>prompt('請手動複製：',text));
}

function clearOrders(){
  if(confirm('確定要清空所有訂單嗎？')){ localStorage.removeItem(STORAGE_KEY); renderSummary(); }
}

buildCategories();
